spring:
  profiles:
    # Activamos "smoke" para ignorar los sleeps y bajar las iteraciones
    active: "smoke"
  application:
    name: planificador
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

data:
  airports:
    file: src/main/resources/data/c.1inf54.26.1.v1.Aeropuerto.husos.v1.20250818__estudiantes.txt
  flights:
    file: src/main/resources/data/planes_vuelo.txt
  baggage:
    dir: src/main/resources/data/_envios_preliminar_/

# ── Planificador: hiperparámetros del ALNS y de los 3 escenarios ────────────
planificador:
  scenario:
    sa-minutos: 10                       # Salto del algoritmo (10 min)

    # --- NUEVA PROPIEDAD PARA LA OPCIÓN B ---
    # Limita la simulación a 5 días (5 días * 144 ventanas/día = 720)
    # Debes usar esta variable en tu bucle for/while del PlanificadorService
    max-ventanas: 52560

    k-default-1: 1
    k-default-2: 14
    k-default-3: 75
    umbral-colapso: 0.20
    umbral-colapso-backlog: 8000
    simular-tiempo-real-2: true          # El perfil smoke pondrá esto en false
    simular-tiempo-real-3: false

  alns:
    iteraciones-base: 9                  # El perfil smoke pondrá esto en 3
    iteraciones-cerca-colapso: 25
    destroy-factor: 0.20
    initial-temp: 500.0
    cooling-rate: 0.85
    min-temp: 0.1
    min-block-size: 3
    segment-length: 3
    reaction-factor: 0.15
    operadores-destroy:
      - capacity
      - worst-route
      - random
      - airport-congestion

  objetivo:
    peso-transit: 1.0
    peso-tarde: 5000.0
    peso-uso-almacen: 50.0
    peso-uso-vuelo: 20.0

  backlog:
    max-size: 10000
    purgar-vencidas: true
    umbral-replanificacion-slack: 0.10
    max-replanificaciones-por-bloque: 20

  benchmark:
    # Configuramos el grid para que no sea infinito
    k-grid: [7, 14, 28, 40]
    cancel-prob-grid: [0.0]
    repeticiones: 1
    timeout-minutos: 90